<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Delta</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #c0c0c0;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    .delta {
      font-size: 4rem;
      color: #333;
      letter-spacing: 0.5rem;
      margin-bottom: 2rem;
      animation: pulse 4s ease-in-out infinite;
    }
    .msg {
      font-size: 0.85rem;
      color: #444;
      line-height: 1.8;
      letter-spacing: 0.15em;
    }
    .msg span {
      color: #666;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="delta">&#916;</div>
    <p class="msg">
      <span>the signal is already here</span><br>
      you just can't see it yet
    </p>
  </div>
</body>
</html>
